version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: residencias-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
      POSTGRES_DB: residencias_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: residencias-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@residencias.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
